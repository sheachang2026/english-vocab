<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛏️ 啾萨听写 - 我的世界</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Press Start 2P', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #5B8BD4 0%, #5B8BD4 40%, #58A048 40%, #58A048 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-attachment: fixed;
        }
        
        body::before {
            content: '☁️        ☁️                    ☁️';
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            color: white;
            font-size: 20px;
            text-align: center;
            opacity: 0.8;
        }
        
        .container {
            background: linear-gradient(180deg, #8B8B8B 0%, #8B8B8B 20%, #6B6B6B 20%, #6B6B6B 100%);
            border: 4px solid #373737;
            border-radius: 0px;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.3);
        }
        
        .grass-top {
            height: 20px;
            background: linear-gradient(180deg, #58A048 0%, #58A048 50%, #6B8B3D 50%, #6B8B3D 100%);
            margin: -20px -20px 10px -20px;
            border-bottom: 4px solid #373737;
        }
        
        h1 { color: #FFFF55; margin-bottom: 5px; font-size: 18px; text-shadow: 2px 2px 0 #6B6B3D; text-align: center; }
        .subtitle { color: #AAAAAA; margin-bottom: 15px; font-size: 8px; text-align: center; }
        
        .score-board {
            background: #373737;
            padding: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-around;
            font-size: 10px;
            border: 2px solid #1D1D1D;
        }
        
        .correct { color: #55FF55; }
        .wrong { color: #FF5555; }
        
        .unit-tag {
            background: #373737;
            color: #AAAAAA;
            padding: 5px 10px;
            font-size: 8px;
            margin-bottom: 10px;
            display: inline-block;
            border: 2px solid #1D1D1D;
        }
        
        .word-card {
            background: #C6C6C6;
            border: 4px solid #373737;
            padding: 15px;
            margin-bottom: 12px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        /* 中文提示变小 */
        .chinese { font-size: 14pt; color: #373737; }
        
        .input-area { margin-bottom: 12px; }
        
        /* 输入框变大 */
        .input-area input {
            font-family: 'Press Start 2P', sans-serif;
            font-size: 16px;
            padding: 15px 20px;
            border: 3px solid #373737;
            background: #C6C6C6;
            width: 100%;
            text-align: center;
            outline: none;
        }
        
        .input-area input:focus { background: #AAAAAA; }
        .input-area input.correct { background: #7DDC7D; border-color: #58A048; }
        .input-area input.wrong { background: #DD7D7D; border-color: #AA4444; }
        
        .speak-btn {
            background: linear-gradient(180deg, #7D7DDD 0%, #4444AA 100%);
            color: white;
            border: 3px solid #373737;
            padding: 8px 15px;
            font-size: 8px;
            font-family: 'Press Start 2P', sans-serif;
            cursor: pointer;
            box-shadow: 3px 3px 0 #373737;
            margin-bottom: 10px;
        }
        
        .speak-btn:hover { transform: translate(1px, 1px); box-shadow: 2px 2px 0 #373737; }
        
        .submit-btn {
            background: linear-gradient(180deg, #7DDC7D 0%, #58A048 100%);
            color: #373737;
            border: 3px solid #373737;
            padding: 10px 20px;
            font-size: 8px;
            font-family: 'Press Start 2P', sans-serif;
            cursor: pointer;
            box-shadow: 3px 3px 0 #373737;
            margin: 3px;
        }
        
        .submit-btn:hover { transform: translate(1px, 1px); box-shadow: 2px 2px 0 #373737; }
        
        .skip-btn {
            background: linear-gradient(180deg, #AAAAAA 0%, #6B6B6B 100%);
            color: white;
            border: 3px solid #373737;
            padding: 10px 20px;
            font-size: 8px;
            font-family: 'Press Start 2P', sans-serif;
            cursor: pointer;
            box-shadow: 3px 3px 0 #373737;
            margin: 3px;
        }
        
        .skip-btn:hover { transform: translate(1px, 1px); box-shadow: 2px 2px 0 #373737; }
        
        /* 正确答案提示区域变大 */
        .feedback { 
            font-size: 10px; 
            margin-top: 10px; 
            padding: 12px; 
            display: none;
            border: 2px solid #373737;
        }
        .feedback.show { display: block; }
        .feedback.correct { background-color: #7DDC7D; color: #373737; }
        .feedback.wrong { background-color: #DD7D7D; color: white; }
        
        .progress { margin-top: 15px; color: #AAAAAA; font-size: 8px; }
        .progress-bar { width: 100%; height: 12px; background: #373737; border: 2px solid #1D1D1D; margin-top: 5px; }
        .progress-fill { height: 100%; background: linear-gradient(180deg, #7DDC7D 0%, #58A048 100%); transition: width 0.3s; }
        
        .celebration { display: none; text-align: center; }
        .celebration.show { display: block; }
        .celebration h2 { color: #FFFF55; font-size: 14px; margin-bottom: 15px; text-shadow: 2px 2px 0 #6B6B3D; }
        
        .restart-btn {
            background: linear-gradient(180deg, #7D7DDD 0%, #4444AA 100%);
            color: white;
            border: 3px solid #373737;
            padding: 12px 20px;
            font-size: 8px;
            font-family: 'Press Start 2P', sans-serif;
            cursor: pointer;
            box-shadow: 3px 3px 0 #373737;
        }
        
        .total-stats { background: #373737; color: #AAAAAA; padding: 8px; margin-top: 12px; font-size: 8px; text-align: center; border: 2px solid #1D1D1D; }
        
        .countdown { color: #FF5555; font-size: 8px; margin-top: 8px; display: none; }
        .countdown.show { display: block; }
        
        .hint-text { color: #AAAAAA; font-size: 6px; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="grass-top"></div>
        <h1>⛏️ 啾萨听写</h1>
        <p class="subtitle">我的世界 · 四年级下册 Unit 1-3</p>
        
        <div class="score-board">
            <span class="correct">✅ 正确: <span id="correct">0</span></span>
            <span class="wrong">❌ 错误: <span id="wrong">0</span></span>
        </div>
        
        <div id="quiz">
            <div class="unit-tag" id="unitTag">Unit 1</div>
            
            <div class="word-card">
                <div class="chinese" id="chinese">爱好</div>
            </div>
            
            <button class="speak-btn" onclick="speakWord()">🔊 朗读单词</button>
            <p style="color:#AAAAAA;font-size:6px;margin-top:5px;">（如果没声音可能是设备不支持英文语音）</p>
            
            <div class="input-area">
                <input type="text" id="answerInput" placeholder="输入英语单词" onkeyup="handleEnter(event)">
            </div>
            <p class="hint-text">输入完按回车或点击确定</p>
            
            <div>
                <button class="submit-btn" onclick="checkAnswer()">✓ 确定</button>
                <button class="skip-btn" onclick="skipWord()">⏭ 跳过</button>
            </div>
            
            <div class="feedback" id="feedback"></div>
            <div class="countdown" id="countdown">下一题：<span id="countdownNum">3</span>秒</div>
        </div>
        
        <div class="progress">
            进度: <span id="progressText">1 / 50</span>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 2%"></div></div>
        </div>
        
        <div class="total-stats">共50个单词，继续加油！💪</div>
        
        <div class="celebration" id="celebration">
            <div style="font-size:30px;">🎉💎🎉</div>
            <h2>太棒了！</h2>
            <p style="color:#AAAAAA;font-size:8px;">你挖到了所有钻石！</p>
            <p id="finalScore" style="color:#FFFF55;font-size:8px;margin:10px 0;"></p>
            <button class="restart-btn" onclick="restart()">🔄 再来一次</button>
        </div>
    </div>

    <script>
        const words = [
            // Unit 1
            { word: "hobby", meaning: "爱好", unit: "Unit 1" },
            { word: "kind", meaning: "种类", unit: "Unit 1" },
            { word: "folk", meaning: "民间的", unit: "Unit 1" },
            { word: "club", meaning: "俱乐部", unit: "Unit 1" },
            { word: "join", meaning: "加入", unit: "Unit 1" },
            { word: "because", meaning: "因为", unit: "Unit 1" },
            { word: "science", meaning: "科学", unit: "Unit 1" },
            { word: "chess", meaning: "国际象棋", unit: "Unit 1" },
            { word: "well", meaning: "好", unit: "Unit 1" },
            { word: "why", meaning: "为什么", unit: "Unit 1" },
            { word: "fan", meaning: "粉丝", unit: "Unit 1" },
            { word: "travel", meaning: "旅行", unit: "Unit 1" },
            { word: "study", meaning: "学习", unit: "Unit 1" },
            { word: "face", meaning: "脸", unit: "Unit 1" },
            { word: "feeling", meaning: "感觉", unit: "Unit 1" },
            // Unit 2
            { word: "throw", meaning: "扔", unit: "Unit 2" },
            { word: "thing", meaning: "东西", unit: "Unit 2" },
            { word: "out", meaning: "外面", unit: "Unit 2" },
            { word: "safe", meaning: "安全的", unit: "Unit 2" },
            { word: "down", meaning: "向下", unit: "Unit 2" },
            { word: "skate", meaning: "滑冰", unit: "Unit 2" },
            { word: "fall", meaning: "落下", unit: "Unit 2" },
            { word: "March", meaning: "三月", unit: "Unit 2" },
            { word: "thin", meaning: "瘦的", unit: "Unit 2" },
            { word: "dangerous", meaning: "危险的", unit: "Unit 2" },
            { word: "board", meaning: "木板", unit: "Unit 2" },
            { word: "lake", meaning: "湖", unit: "Unit 2" },
            { word: "careful", meaning: "小心的", unit: "Unit 2" },
            { word: "push", meaning: "推", unit: "Unit 2" },
            { word: "crowd", meaning: "人群", unit: "Unit 2" },
            { word: "slowly", meaning: "慢地", unit: "Unit 2" },
            { word: "fast", meaning: "快", unit: "Unit 2" },
            { word: "street", meaning: "街道", unit: "Unit 2" },
            { word: "light", meaning: "灯", unit: "Unit 2" },
            { word: "again", meaning: "再一次", unit: "Unit 2" },
            // Unit 3
            { word: "fun", meaning: "有趣", unit: "Unit 3" },
            { word: "game", meaning: "游戏", unit: "Unit 3" },
            { word: "be good at", meaning: "擅长", unit: "Unit 3" },
            { word: "seventy", meaning: "七十", unit: "Unit 3" },
            { word: "eighty", meaning: "八十", unit: "Unit 3" },
            { word: "ninety", meaning: "九十", unit: "Unit 3" },
            { word: "tired", meaning: "累的", unit: "Unit 3" },
            { word: "win", meaning: "赢", unit: "Unit 3" },
            { word: "hundred", meaning: "百", unit: "Unit 3" },
            { word: "kung fu", meaning: "功夫", unit: "Unit 3" },
            { word: "leg", meaning: "腿", unit: "Unit 3" },
            { word: "hurt", meaning: "受伤", unit: "Unit 3" },
            { word: "badly", meaning: "严重地", unit: "Unit 3" },
            { word: "king", meaning: "国王", unit: "Unit 3" },
            { word: "visit", meaning: "参观", unit: "Unit 3" },
            { word: "the Great Wall", meaning: "长城", unit: "Unit 3" },
            { word: "hero", meaning: "英雄", unit: "Unit 3" },
            { word: "him", meaning: "他", unit: "Unit 3" },
            // Unit 5
            { word: "Labour Day", meaning: "劳动节", unit: "Unit 5" },
            { word: "holiday", meaning: "假期", unit: "Unit 5" },
            { word: "May", meaning: "五月", unit: "Unit 5" },
            { word: "chore", meaning: "家务", unit: "Unit 5" },
            { word: "the USA", meaning: "美国", unit: "Unit 5" },
            { word: "September", meaning: "九月", unit: "Unit 5" },
            { word: "June", meaning: "六月", unit: "Unit 5" },
            { word: "Canada", meaning: "加拿大", unit: "Unit 5" },
            { word: "often", meaning: "经常", unit: "Unit 5" },
            { word: "cinema", meaning: "电影院", unit: "Unit 5" },
            { word: "National Day", meaning: "国庆节", unit: "Unit 5" },
            { word: "October", meaning: "十月", unit: "Unit 5" },
            { word: "flag", meaning: "旗帜", unit: "Unit 5" },
            { word: "watch", meaning: "观看", unit: "Unit 5" },
            { word: "early", meaning: "早的", unit: "Unit 5" },
            { word: "special", meaning: "特殊的", unit: "Unit 5" },
            { word: "Water-Splashing Festival", meaning: "泼水节", unit: "Unit 5" },
            { word: "April", meaning: "四月", unit: "Unit 5" },
            { word: "Inner Mongolia", meaning: "内蒙古", unit: "Unit 5" },
            { word: "Naadam", meaning: "那达慕", unit: "Unit 5" },
            { word: "July", meaning: "七月", unit: "Unit 5" },
            { word: "August", meaning: "八月", unit: "Unit 5" },
            // Unit 6
            { word: "grandma", meaning: "奶奶/外婆", unit: "Unit 6" },
            { word: "dear", meaning: "亲爱的", unit: "Unit 6" },
            { word: "TV", meaning: "电视", unit: "Unit 6" },
            { word: "television", meaning: "电视机", unit: "Unit 6" },
            { word: "grandpa", meaning: "爷爷/外公", unit: "Unit 6" },
            { word: "plant", meaning: "植物", unit: "Unit 6" },
            { word: "kitchen", meaning: "厨房", unit: "Unit 6" },
            { word: "weekend", meaning: "周末", unit: "Unit 6" },
            { word: "people", meaning: "人们", unit: "Unit 6" },
            { word: "they", meaning: "他们", unit: "Unit 6" },
            { word: "sky", meaning: "天空", unit: "Unit 6" },
            { word: "fly", meaning: "飞", unit: "Unit 6" },
            { word: "put", meaning: "放", unit: "Unit 6" },
            { word: "role", meaning: "角色", unit: "Unit 6" },
            { word: "paint", meaning: "画", unit: "Unit 6" },
            { word: "funny", meaning: "有趣的", unit: "Unit 6" },
            { word: "brave", meaning: "勇敢的", unit: "Unit 6" },
            { word: "enjoy", meaning: "喜欢", unit: "Unit 6" },
            { word: "world", meaning: "世界", unit: "Unit 6" },
            { word: "woman", meaning: "女人", unit: "Unit 6" },
            { word: "tea", meaning: "茶", unit: "Unit 6" },
            { word: "rabbit", meaning: "兔子", unit: "Unit 6" },
            // Unit 7
            { word: "glad", meaning: "高兴的", unit: "Unit 7" },
            { word: "need", meaning: "需要", unit: "Unit 7" },
            { word: "buy", meaning: "买", unit: "Unit 7" },
            { word: "tell", meaning: "告诉", unit: "Unit 7" },
            { word: "way", meaning: "方式", unit: "Unit 7" },
            { word: "shop", meaning: "商店", unit: "Unit 7" },
            { word: "near", meaning: "附近", unit: "Unit 7" },
            { word: "front", meaning: "前面", unit: "Unit 7" },
            { word: "in front of", meaning: "在...前面", unit: "Unit 7" },
            { word: "building", meaning: "建筑物", unit: "Unit 7" },
            { word: "far", meaning: "远", unit: "Unit 7" },
            { word: "robot", meaning: "机器人", unit: "Unit 7" },
            { word: "know", meaning: "知道", unit: "Unit 7" },
            { word: "third", meaning: "第三", unit: "Unit 7" },
            { word: "shelf", meaning: "架子", unit: "Unit 7" },
            { word: "letter", meaning: "信", unit: "Unit 7" },
            { word: "second", meaning: "第二", unit: "Unit 7" },
            { word: "beside", meaning: "旁边", unit: "Unit 7" },
            { word: "playground", meaning: "操场", unit: "Unit 7" },
            { word: "centre", meaning: "中心", unit: "Unit 7" },
            { word: "smart", meaning: "聪明的", unit: "Unit 7" },
            { word: "community", meaning: "社区", unit: "Unit 7" },
            { word: "themselves", meaning: "他们自己", unit: "Unit 7" },
            { word: "dark", meaning: "黑暗的", unit: "Unit 7" },
            { word: "toilet", meaning: "厕所", unit: "Unit 7" },
            { word: "between", meaning: "之间", unit: "Unit 7" },
            { word: "supermarket", meaning: "超市", unit: "Unit 7" },
            { word: "quickly", meaning: "快速地", unit: "Unit 7" }
        ];
        
        let currentIndex = 0, correctCount = 0, wrongCount = 0, shuffledWords = [];
        
        function shuffle() {
            shuffledWords = [...words];
            for (let i = shuffledWords.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledWords[i], shuffledWords[j]] = [shuffledWords[j], shuffledWords[i]];
            }
        }
        
        function speakWord() {
            const word = shuffledWords[currentIndex].word;
            if ('speechSynthesis' in window) {
                // 先停止之前的朗读
                speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                
                speechSynthesis.speak(utterance);
            }
        }
        
        function handleEnter(event) { if (event.key === 'Enter') checkAnswer(); }
        
        function checkAnswer() {
            const input = document.getElementById('answerInput');
            const userAnswer = input.value.trim().toLowerCase();
            const correctAnswer = shuffledWords[currentIndex].word.toLowerCase();
            const isCorrect = (userAnswer === correctAnswer);
            const feedback = document.getElementById('feedback');
            
            if (isCorrect) {
                correctCount++;
                document.getElementById('correct').textContent = correctCount;
                input.classList.add('correct');
                input.classList.remove('wrong');
                feedback.textContent = '✓ 正确！ ' + shuffledWords[currentIndex].word;
                feedback.className = 'feedback show correct';
            } else {
                wrongCount++;
                document.getElementById('wrong').textContent = wrongCount;
                input.classList.add('wrong');
                input.classList.remove('correct');
                feedback.textContent = '✗ 正确答案是: ' + shuffledWords[currentIndex].word;
                feedback.className = 'feedback show wrong';
            }
            
            input.disabled = true;
            
            let count = 3;
            document.getElementById('countdown').classList.add('show');
            document.getElementById('countdownNum').textContent = count;
            
            let timer = setInterval(() => {
                count--;
                document.getElementById('countdownNum').textContent = count;
                if (count <= 0) { clearInterval(timer); nextWord(); }
            }, 1000);
        }
        
        function skipWord() {
            wrongCount++;
            document.getElementById('wrong').textContent = wrongCount;
            const feedback = document.getElementById('feedback');
            feedback.textContent = '⏭ 跳过！答案是: ' + shuffledWords[currentIndex].word;
            feedback.className = 'feedback show wrong';
            document.getElementById('answerInput').disabled = true;
            
            let count = 2;
            document.getElementById('countdown').classList.add('show');
            document.getElementById('countdownNum').textContent = count;
            
            let timer = setInterval(() => {
                count--;
                document.getElementById('countdownNum').textContent = count;
                if (count <= 0) { clearInterval(timer); nextWord(); }
            }, 1000);
        }
        
        function nextWord() {
            currentIndex++;
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').disabled = false;
            document.getElementById('answerInput').classList.remove('correct', 'wrong');
            document.getElementById('answerInput').focus();
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('countdown').classList.remove('show');
            
            if (currentIndex >= shuffledWords.length) { showCelebration(); return; }
            
            document.getElementById('unitTag').textContent = shuffledWords[currentIndex].unit;
            document.getElementById('chinese').textContent = shuffledWords[currentIndex].meaning;
            document.getElementById('progressText').textContent = (currentIndex + 1) + ' / ' + shuffledWords.length;
            document.getElementById('progressFill').style.width = ((currentIndex + 1) / shuffledWords.length * 100) + '%';
        }
        
        function showCelebration() {
            document.getElementById('quiz').style.display = 'none';
            document.querySelector('.progress').style.display = 'none';
            document.querySelector('.total-stats').style.display = 'none';
            document.getElementById('celebration').classList.add('show');
            
            const total = correctCount + wrongCount;
            const percent = total > 0 ? Math.round(correctCount / total * 100) : 0;
            document.getElementById('finalScore').textContent = `正确: ${correctCount} | 错误: ${wrongCount} | 正确率: ${percent}%`;
        }
        
        function restart() {
            currentIndex = 0; correctCount = 0; wrongCount = 0; shuffle();
            document.getElementById('correct').textContent = '0';
            document.getElementById('wrong').textContent = '0';
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').disabled = false;
            document.getElementById('answerInput').classList.remove('correct', 'wrong');
            document.getElementById('answerInput').focus();
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('countdown').classList.remove('show');
            document.getElementById('unitTag').textContent = shuffledWords[0].unit;
            document.getElementById('chinese').textContent = shuffledWords[0].meaning;
            document.getElementById('progressText').textContent = '1 / ' + shuffledWords.length;
            document.getElementById('progressFill').style.width = (1 / shuffledWords.length * 100) + '%';
            document.getElementById('quiz').style.display = 'block';
            document.querySelector('.progress').style.display = 'block';
            document.querySelector('.total-stats').style.display = 'block';
            document.getElementById('celebration').classList.remove('show');
        }
        
        shuffle();
        
        // 页面加载时初始化显示
        document.getElementById('unitTag').textContent = shuffledWords[0].unit;
        document.getElementById('chinese').textContent = shuffledWords[0].meaning;
    </script>
</body>
</html>
