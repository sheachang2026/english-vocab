<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>索玛立方体 - 观察物体</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        
        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #FFD700;
            text-align: center;
        }
        
        .subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            text-align: center;
            margin-bottom: 20px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 14px 20px;
            margin: 6px 0;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .btn:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 0 20px rgba(240, 147, 251, 0.4);
        }
        
        .info-box {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .info-title {
            font-size: 14px;
            font-weight: bold;
            color: #4ECDC4;
            margin-bottom: 8px;
        }
        
        .info-text {
            font-size: 12px;
            line-height: 1.5;
            color: rgba(255,255,255,0.7);
        }
        
        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .scene {
            width: 300px;
            height: 300px;
            perspective: 1200px;
        }
        
        .cube3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-25deg) rotateY(-40deg);
            transition: transform 0.05s;
        }
        
        /* 立方体面 */
        .face {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(78, 205, 196, 0.3);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2px;
            padding: 2px;
        }
        
        .face-front { 
            transform: translateZ(150px); 
        }
        .face-back { 
            transform: translateZ(-150px) rotateY(180deg); 
        }
        .face-right { 
            transform: rotateY(90deg) translateZ(150px); 
        }
        .face-left { 
            transform: rotateY(-90deg) translateZ(150px); 
        }
        .face-top { 
            transform: rotateX(90deg) translateZ(150px); 
        }
        .face-bottom { 
            transform: rotateX(-90deg) translateZ(150px); 
        }
        
        .cell {
            background: linear-gradient(135deg, #4ECDC4 0%, #44a08d 100%);
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        
        .cell.empty {
            background: transparent;
            box-shadow: none;
        }
        
        .cell.filled {
            background: linear-gradient(135deg, #FF6B6B 0%, #ee5a24 100%);
        }
        
        /* 颜色变体 */
        .cube3d.piece-1 .cell.filled { background: linear-gradient(135deg, #FF6B6B 0%, #c0392b 100%); }
        .cube3d.piece-2 .cell.filled { background: linear-gradient(135deg, #4ECDC4 0%, #16a085 100%); }
        .cube3d.piece-3 .cell.filled { background: linear-gradient(135deg, #45B7D1 0%, #2980b9 100%); }
        .cube3d.piece-4 .cell.filled { background: linear-gradient(135deg, #96CEB4 0%, #27ae60 100%); }
        .cube3d.piece-5 .cell.filled { background: linear-gradient(135deg, #FFEAA7 0%, #f39c12 100%); }
        .cube3d.piece-6 .cell.filled { background: linear-gradient(135deg, #DDA0DD 0%, #8e44ad 100%); }
        .cube3d.piece-7 .cell.filled { background: linear-gradient(135deg, #98D8C8 0%, #1abc9c 100%); }
        
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        
        .control-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        
        .control-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }
        
        .view-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }
        
        .view-label {
            color: #FFD700;
            font-weight: bold;
            font-size: 12px;
        }
        
        .view-name {
            font-size: 18px;
            margin-top: 5px;
        }
        
        .hint {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,215,0,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: #FFD700;
        }
        
        /* 视图网格 */
        .views {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .view-box {
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }
        
        .view-box-title {
            font-size: 11px;
            color: #FFD700;
            margin-bottom: 5px;
        }
        
        .view-grid {
            display: grid;
            grid-template-columns: repeat(3, 18px);
            gap: 2px;
        }
        
        .view-cell {
            width: 18px;
            height: 18px;
            background: #4ECDC4;
            border-radius: 2px;
        }
        
        .view-cell.empty {
            background: rgba(255,255,255,0.1);
        }
        
        @keyframes float {
            0%, 100% { transform: rotateX(-25deg) rotateY(-40deg); }
            50% { transform: rotateX(-25deg) rotateY(-40deg) rotateY(360deg); }
        }
        
        .auto-rotate {
            animation: float 8s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="title">🔮 索玛立方体</div>
            <div class="subtitle">四年级数学 - 观察物体</div>
            
            <button class="btn active" onclick="setMode('single')">📦 1个完整立方体</button>
            <button class="btn" onclick="setMode('front')">📷 从正面看</button>
            <button class="btn" onclick="setMode('side')">📷 从侧面看</button>
            <button class="btn" onclick="setMode('top')">📷 从上面看</button>
            <button class="btn" onclick="setMode('pieces')">🧩 7个块(分散)</button>
            <button class="btn" onclick="setMode('explode')">💥 爆炸图</button>
            
            <div class="info-box">
                <div class="info-title">💡 什么是三视图？</div>
                <div class="info-text">
                    <b>正视图</b> - 从正面看<br>
                    <b>侧视图</b> - 从侧面看<br>
                    <b>俯视图</b> - 从上面看
                </div>
            </div>
            
            <div class="info-box">
                <div class="info-title">🎮 操作</div>
                <div class="info-text">
                    • 拖动鼠标旋转<br>
                    • 点击按钮切换视图
                </div>
            </div>
        </div>
        
        <div class="canvas-container">
            <div class="scene">
                <div class="cube3d" id="cube3d">
                    <div class="face face-front" id="faceFront"></div>
                    <div class="face face-back" id="faceBack"></div>
                    <div class="face face-right" id="faceRight"></div>
                    <div class="face face-left" id="faceLeft"></div>
                    <div class="face face-top" id="faceTop"></div>
                    <div class="face face-bottom" id="faceBottom"></div>
                </div>
            </div>
            
            <div class="hint">🖱️ 用鼠标拖动旋转立方体</div>
            
            <div class="controls">
                <button class="control-btn" onclick="rotate('x', -15)">⬆️</button>
                <button class="control-btn" onclick="rotate('x', 15)">⬇️</button>
                <button class="control-btn" onclick="rotate('y', -15)">⬅️</button>
                <button class="control-btn" onclick="rotate('y', 15)">➡️</button>
                <button class="control-btn" onclick="reset()">🏠</button>
                <button class="control-btn" onclick="toggleAuto()">🔄</button>
            </div>
            
            <div class="view-info">
                <div class="view-label">当前视角</div>
                <div class="view-name" id="viewName">3D视图</div>
            </div>
            
            <div class="views">
                <div class="view-box">
                    <div class="view-box-title">正面</div>
                    <div class="view-grid" id="viewFront"></div>
                </div>
                <div class="view-box">
                    <div class="view-box-title">侧面</div>
                    <div class="view-grid" id="viewSide"></div>
                </div>
                <div class="view-box">
                    <div class="view-box-title">上面</div>
                    <div class="view-grid" id="viewTop"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'single';
        let rotX = -25;
        let rotY = -40;
        let isDragging = false;
        let lastX, lastY;
        let autoRotating = false;
        
        // 3x3 填充模式 (1=填充, 0=空)
        const patterns = {
            // 实心立方体
            single: {
                front:  [[1,1,1],[1,1,1],[1,1,1]],
                back:   [[1,1,1],[1,1,1],[1,1,1]],
                right:  [[1,1,1],[1,1,1],[1,1,1]],
                left:   [[1,1,1],[1,1,1],[1,1,1]],
                top:    [[1,1,1],[1,1,1],[1,1,1]],
                bottom: [[1,1,1],[1,1,1],[1,1,1]]
            },
            // 只有正面
            front: {
                front:  [[1,1,1],[1,1,1],[1,1,1]],
                back:   [[0,0,0],[0,0,0],[0,0,0]],
                right:  [[0,0,0],[0,0,0],[0,0,0]],
                left:   [[0,0,0],[0,0,0],[0,0,0]],
                top:    [[0,0,0],[0,0,0],[0,0,0]],
                bottom: [[0,0,0],[0,0,0],[0,0,0]]
            },
            // 只有侧面
            side: {
                front:  [[0,0,0],[0,0,0],[0,0,0]],
                back:   [[0,0,0],[0,0,0],[0,0,0]],
                right:  [[1,1,1],[1,1,1],[1,1,1]],
                left:   [[0,0,0],[0,0,0],[0,0,0]],
                top:    [[0,0,0],[0,0,0],[0,0,0]],
                bottom: [[0,0,0],[0,0,0],[0,0,0]]
            },
            // 只有上面
            top: {
                front:  [[0,0,0],[0,0,0],[0,0,0]],
                back:   [[0,0,0],[0,0,0],[0,0,0]],
                right:  [[0,0,0],[0,0,0],[0,0,0]],
                left:   [[0,0,0],[0,0,0],[0,0,0]],
                top:    [[1,1,1],[1,1,1],[1,1,1]],
                bottom: [[0,0,0],[0,0,0],[0,0,0]]
            }
        };
        
        function renderFace(faceId, pattern) {
            const face = document.getElementById(faceId);
            face.innerHTML = '';
            
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 3; col++) {
                    const cell = document.createElement('div');
                    cell.className = pattern[row][col] ? 'cell filled' : 'cell empty';
                    face.appendChild(cell);
                }
            }
        }
        
        function renderViews() {
            // 正面视图
            const frontGrid = document.getElementById('viewFront');
            frontGrid.innerHTML = '';
            [[1,1,1],[1,1,1],[1,1,1]].forEach(row => {
                row.forEach(cell => {
                    const div = document.createElement('div');
                    div.className = cell ? 'view-cell' : 'view-cell empty';
                    frontGrid.appendChild(div);
                });
            });
            
            // 侧面视图
            const sideGrid = document.getElementById('viewSide');
            sideGrid.innerHTML = '';
            [[1,1,1],[1,1,1],[1,1,1]].forEach(row => {
                row.forEach(cell => {
                    const div = document.createElement('div');
                    div.className = cell ? 'view-cell' : 'view-cell empty';
                    sideGrid.appendChild(div);
                });
            });
            
            // 上面视图
            const topGrid = document.getElementById('viewTop');
            topGrid.innerHTML = '';
            [[1,1,1],[1,1,1],[1,1,1]].forEach(row => {
                row.forEach(cell => {
                    const div = document.createElement('div');
                    div.className = cell ? 'view-cell' : 'view-cell empty';
                    topGrid.appendChild(div);
                });
            });
        }
        
        function setMode(mode) {
            currentMode = mode;
            
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const cube = document.getElementById('cube3d');
            
            if (mode === 'pieces') {
                // 分散模式 - 简化为显示不同颜色
                cube.className = 'cube3d piece-1';
                renderFace('faceFront', [[1,1,1],[1,1,1],[1,1,1]]);
                renderFace('faceBack', [[1,1,1],[1,1,1],[1,1,1]]);
                renderFace('faceRight', [[1,1,1],[1,1,1],[1,1,1]]);
                renderFace('faceLeft', [[1,1,1],[1,1,1],[1,1,1]]);
                renderFace('faceTop', [[1,1,1],[1,1,1],[1,1,1]]);
                renderFace('faceBottom', [[1,1,1],[1,1,1],[1,1,1]]);
                document.getElementById('viewName').textContent = '7个零件';
                cube.style.transform = 'rotateX(-30deg) rotateY(30deg) scale(0.8)';
            } else if (mode === 'explode') {
                // 爆炸图
                cube.className = 'cube3d';
                cube.style.transform = 'rotateX(-20deg) rotateY(45deg)';
                const faces = ['frontFront', 'frontBack', 'frontRight', 'frontLeft', 'frontTop', 'frontBottom'];
                document.getElementById('viewName').textContent = '爆炸图';
                
                // 模拟爆炸效果 - 缩小所有面
                ['faceFront', 'faceBack', 'faceRight', 'faceLeft', 'faceTop', 'faceBottom'].forEach(id => {
                    const face = document.getElementById(id);
                    face.style.transform = face.style.transform.replace('translateZ(150px)', 'translateZ(80px)');
                });
                
                renderFace('faceFront', [[1,0,1],[0,1,0],[1,0,1]]);
                renderFace('faceBack', [[1,0,1],[0,1,0],[1,0,1]]);
                renderFace('faceRight', [[1,1,1],[1,0,1],[1,1,1]]);
                renderFace('faceLeft', [[1,1,1],[1,0,1],[1,1,1]]);
                renderFace('faceTop', [[1,0,1],[0,1,0],[1,0,1]]);
                renderFace('faceBottom', [[1,1,1],[1,1,1],[1,1,1]]);
            } else {
                // 标准模式
                cube.className = 'cube3d';
                const pattern = patterns[mode];
                
                renderFace('faceFront', pattern.front);
                renderFace('faceBack', pattern.back);
                renderFace('faceRight', pattern.right);
                renderFace('faceLeft', pattern.left);
                renderFace('faceTop', pattern.top);
                renderFace('faceBottom', pattern.bottom);
                
                const names = {
                    'single': '3D视图',
                    'front': '正视图',
                    'side': '侧视图',  
                    'top': '俯视图'
                };
                document.getElementById('viewName').textContent = names[mode];
                
                // 切换到对应视角
                const views = {
                    'single': 'rotateX(-25deg) rotateY(-40deg)',
                    'front': 'rotateY(0deg)',
                    'side': 'rotateY(90deg)',
                    'top': 'rotateX(-90deg)'
                };
                cube.style.transform = views[mode];
                rotX = mode === 'top' ? -90 : (mode === 'single' ? -25 : 0);
                rotY = mode === 'side' ? 90 : (mode === 'single' ? -40 : 0);
            }
        }
        
        function rotate(axis, angle) {
            const cube = document.getElementById('cube3d');
            
            if (axis === 'x') rotX += angle;
            if (axis === 'y') rotY += angle;
            
            cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            document.getElementById('viewName').textContent = '手动旋转';
        }
        
        function reset() {
            rotX = -25;
            rotY = -40;
            const cube = document.getElementById('cube3d');
            cube.style.transform = 'rotateX(-25deg) rotateY(-40deg)';
            cube.classList.remove('auto-rotate');
            autoRotating = false;
            document.getElementById('viewName').textContent = '已重置';
        }
        
        function toggleAuto() {
            const cube = document.getElementById('cube3d');
            autoRotating = !autoRotating;
            
            if (autoRotating) {
                cube.classList.add('auto-rotate');
                document.getElementById('viewName').textContent = '自动旋转中';
            } else {
                cube.classList.remove('auto-rotate');
                document.getElementById('viewName').textContent = '已暂停';
            }
        }
        
        // 鼠标拖动
        const cube = document.getElementById('cube3d');
        const container = document.querySelector('.canvas-container');
        
        container.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('btn') || e.target.classList.contains('control-btn')) return;
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
            container.style.cursor = 'grabbing';
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const deltaX = e.clientX - lastX;
            const deltaY = e.clientY - lastY;
            
            rotY += deltaX * 0.5;
            rotX -= deltaY * 0.5;
            
            cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            
            lastX = e.clientX;
            lastY = e.clientY;
            document.getElementById('viewName').textContent = '手动旋转';
        });
        
        document.addEventListener('mouseup', () => {
            isDragging = false;
            container.style.cursor = 'grab';
        });
        
        // 触摸支持
        container.addEventListener('touchstart', (e) => {
            isDragging = true;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });
        
        container.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            
            const deltaX = e.touches[0].clientX - lastX;
            const deltaY = e.touches[0].clientY - lastY;
            
            rotY += deltaX * 0.5;
            rotX -= deltaY * 0.5;
            
            cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });
        
        container.addEventListener('touchend', () => isDragging = false);
        
        // 初始化
        setMode('single');
        renderViews();
    </script>
</body>
</html>
