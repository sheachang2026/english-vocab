<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛏️ 啾萨背单词 - 我的世界</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Press Start 2P', 'Microsoft YaHei', sans-serif;
            /* 天空更多 + 草坪7% + 泥土 */
            background: linear-gradient(180deg, 
                #5B8BD4 0%, 
                #5B8BD4 50%, 
                #58A048 50%, 
                #58A048 57%, 
                #8B5A2B 57%, 
                #6B4423 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-attachment: fixed;
        }
        
        body::before {
            content: '☁️        ☁️                    ☁️';
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            color: white;
            font-size: 20px;
            text-align: center;
            opacity: 0.8;
            z-index: 1;
        }
        
        .container {
            background: linear-gradient(180deg, #8B8B8B 0%, #8B8B8B 20%, #6B6B6B 20%, #6B6B6B 100%);
            border: 4px solid #373737;
            border-radius: 0px;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.3);
            margin-top: 50px;
        }
        
        .grass-top {
            height: 20px;
            background: linear-gradient(180deg, #58A048 0%, #58A048 50%, #6B8B3D 50%, #6B8B3D 100%);
            margin: -20px -20px 10px -20px;
            border-bottom: 4px solid #373737;
        }
        
        h1 { color: #FFFF55; margin-bottom: 5px; font-size: 20px; text-shadow: 2px 2px 0 #6B6B3D; text-align: center; }
        .subtitle { color: #AAAAAA; margin-bottom: 15px; font-size: 8px; text-align: center; }
        
        .score-board {
            background: #373737;
            padding: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-around;
            font-size: 10px;
            border: 2px solid #1D1D1D;
        }
        
        .correct { color: #55FF55; }
        .wrong { color: #FF5555; }
        
        .unit-tag {
            background: #373737;
            color: #AAAAAA;
            padding: 5px 10px;
            font-size: 8px;
            margin-bottom: 10px;
            display: inline-block;
            border: 2px solid #1D1D1D;
        }
        
        .word-card {
            background: #C6C6C6;
            border: 4px solid #373737;
            padding: 30px;
            margin-bottom: 10px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 80%;
            margin-left: 10%;
        }
        
        .english { font-size: 24px; color: #00AAAA; margin-bottom: 10px; text-shadow: 1px 1px 0 #008888; }
        .chinese { font-size: 14px; color: #373737; display: none; }
        .chinese.show { display: block; }
        
        .buttons { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            flex-wrap: wrap;
            width: 80%;
            margin-left: 10%;
        }
        
        .know-btn {
            background: linear-gradient(180deg, #7DDC7D 0%, #58A048 100%);
            color: #373737;
            border: 3px solid #373737;
            padding: 15px 30px;
            font-size: 12px;
            font-family: 'Press Start 2P', sans-serif;
            cursor: pointer;
            box-shadow: 3px 3px 0 #373737;
        }
        
        .know-btn:hover { transform: translate(1px, 1px); box-shadow: 2px 2px 0 #373737; }
        
        .dont-know-btn {
            background: linear-gradient(180deg, #DD7D7D 0%, #AA4444 100%);
            color: #FFFFFF;
            border: 3px solid #373737;
            padding: 15px 30px;
            font-size: 12px;
            font-family: 'Press Start 2P', sans-serif;
            cursor: pointer;
            box-shadow: 3px 3px 0 #373737;
        }
        
        .dont-know-btn:hover { transform: translate(1px, 1px); box-shadow: 2px 2px 0 #373737; }
        
        .progress { margin-top: 15px; color: #AAAAAA; font-size: 8px; }
        .progress-bar { width: 100%; height: 12px; background: #373737; border: 2px solid #1D1D1D; margin-top: 5px; }
        .progress-fill { height: 100%; background: linear-gradient(180deg, #7DDC7D 0%, #58A048 100%); transition: width 0.3s; }
        
        .celebration { display: none; text-align: center; }
        .celebration.show { display: block; }
        .celebration h2 { color: #FFFF55; font-size: 16px; margin-bottom: 15px; text-shadow: 2px 2px 0 #6B6B3D; }
        
        .restart-btn {
            background: linear-gradient(180deg, #7D7DDD 0%, #4444AA 100%);
            color: white;
            border: 3px solid #373737;
            padding: 12px 20px;
            font-size: 10px;
            font-family: 'Press Start 2P', sans-serif;
            cursor: pointer;
            box-shadow: 3px 3px 0 #373737;
        }
        
        .total-stats { background: #373737; color: #AAAAAA; padding: 8px; margin-top: 12px; font-size: 8px; text-align: center; border: 2px solid #1D1D1D; }
        
        .countdown { color: #FF5555; font-size: 10px; margin-top: 10px; display: none; text-align: center; }
        .countdown.show { display: block; }
        
        // 开始按钮
        .start-btn {
            background: linear-gradient(180deg, #55AAFF 0%, #0066CC 100%);
            color: white;
            border: 3px solid #373737;
            padding: 20px 40px;
            font-size: 14px;
            font-family: 'Press Start 2P', sans-serif;
            cursor: pointer;
            box-shadow: 3px 3px 0 #373737;
            margin: 20px auto;
            display: block;
        }
        
        .hint-audio {
            color: #AAAAAA;
            font-size: 6px;
            margin-top: 8px;
            text-align: center;
        }
        
        .start-btn:hover { transform: translate(1px, 1px); box-shadow: 2px 2px 0 #373737; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="grass-top"></div>
        <h1>⛏️ 啾萨背单词</h1>
        <p class="subtitle">我的世界 · 四年级下册 单词表</p>
        
        <div class="score-board">
            <span class="correct">✅ 认识: <span id="correct">0</span></span>
            <span class="wrong">❌ 不认识: <span id="wrong">0</span></span>
        </div>
        
        <div id="quiz">
            <button class="start-btn" id="startBtn" onclick="startGame()">🎮 点击开始</button>
            
            <div id="gameContent" class="hidden">
            <div class="unit-tag" id="unitTag">Unit 1</div>
            
            <div class="word-card">
                <div class="english" id="word">hobby</div>
                <div class="chinese" id="meaning">爱好</div>
            </div>
            
            <div class="buttons">
                <button class="know-btn" id="knowBtn" onclick="answer(true)">✅ 认识</button>
                <button class="dont-know-btn" id="dontKnowBtn" onclick="answer(false)">❌ 不认识</button>
            </div>
            
            <div class="countdown" id="countdown">记住啦！<span id="countdownNum">5</span>秒...</div>
            </div>
        </div>
        
        <div class="progress">
            进度: <span id="progressText">1 / 50</span>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 2%"></div></div>
        </div>
        
        <div class="total-stats">共50个单词，继续加油！💪</div>
        
        <div class="celebration" id="celebration">
            <div style="font-size:40px;">🎉🏆🎉</div>
            <h2>太棒了！</h2>
            <p style="color:#AAAAAA;font-size:10px;">你已经挖完所有钻石啦！</p>
            <button class="restart-btn" onclick="restart()" style="margin-top:15px;">🔄 再来一次</button>
        </div>
    </div>

    <script>
        const words = [
            // 假期与国家
            { word: "Labour Day", meaning: "劳动节", unit: "Unit 1" },
            { word: "holiday", meaning: "假期", unit: "Unit 1" },
            { word: "May", meaning: "五月", unit: "Unit 1" },
            { word: "chore", meaning: "家务", unit: "Unit 1" },
            { word: "the USA", meaning: "美国", unit: "Unit 1" },
            { word: "September", meaning: "九月", unit: "Unit 1" },
            { word: "June", meaning: "六月", unit: "Unit 1" },
            { word: "Canada", meaning: "加拿大", unit: "Unit 1" },
            { word: "often", meaning: "经常", unit: "Unit 1" },
            { word: "cinema", meaning: "电影院", unit: "Unit 1" },
            { word: "National Day", meaning: "国庆节", unit: "Unit 1" },
            { word: "October", meaning: "十月", unit: "Unit 1" },
            { word: "flag", meaning: "旗帜", unit: "Unit 1" },
            { word: "watch", meaning: "观看", unit: "Unit 1" },
            { word: "early", meaning: "早的", unit: "Unit 1" },
            { word: "special", meaning: "特殊的", unit: "Unit 1" },
            { word: "Water-Splashing Festival", meaning: "泼水节", unit: "Unit 1" },
            { word: "April", meaning: "四月", unit: "Unit 1" },
            { word: "Inner Mongolia", meaning: "内蒙古", unit: "Unit 1" },
            { word: "Naadam", meaning: "那达慕", unit: "Unit 1" },
            { word: "July", meaning: "七月", unit: "Unit 1" },
            { word: "August", meaning: "八月", unit: "Unit 1" },
            // 家庭与人物
            { word: "grandma", meaning: "奶奶/外婆", unit: "Unit 2" },
            { word: "dear", meaning: "亲爱的", unit: "Unit 2" },
            { word: "TV", meaning: "电视", unit: "Unit 2" },
            { word: "television", meaning: "电视机", unit: "Unit 2" },
            { word: "grandpa", meaning: "爷爷/外公", unit: "Unit 2" },
            { word: "plant", meaning: "植物", unit: "Unit 2" },
            { word: "kitchen", meaning: "厨房", unit: "Unit 2" },
            { word: "weekend", meaning: "周末", unit: "Unit 2" },
            { word: "people", meaning: "人们", unit: "Unit 2" },
            { word: "they", meaning: "他们", unit: "Unit 2" },
            { word: "sky", meaning: "天空", unit: "Unit 2" },
            { word: "fly", meaning: "飞", unit: "Unit 2" },
            { word: "put", meaning: "放", unit: "Unit 2" },
            { word: "role", meaning: "角色", unit: "Unit 2" },
            { word: "paint", meaning: "画", unit: "Unit 2" },
            { word: "funny", meaning: "有趣的", unit: "Unit 2" },
            { word: "brave", meaning: "勇敢的", unit: "Unit 2" },
            { word: "enjoy", meaning: "喜欢", unit: "Unit 2" },
            { word: "world", meaning: "世界", unit: "Unit 2" },
            { word: "woman", meaning: "女人", unit: "Unit 2" },
            { word: "tea", meaning: "茶", unit: "Unit 2" },
            { word: "rabbit", meaning: "兔子", unit: "Unit 2" },
            // 生活与社区
            { word: "glad", meaning: "高兴的", unit: "Unit 3" },
            { word: "need", meaning: "需要", unit: "Unit 3" },
            { word: "buy", meaning: "买", unit: "Unit 3" },
            { word: "tell", meaning: "告诉", unit: "Unit 3" },
            { word: "way", meaning: "方式", unit: "Unit 3" },
            { word: "shop", meaning: "商店", unit: "Unit 3" },
            { word: "near", meaning: "附近", unit: "Unit 3" },
            { word: "front", meaning: "前面", unit: "Unit 3" },
            { word: "in front of", meaning: "在...前面", unit: "Unit 3" },
            { word: "building", meaning: "建筑物", unit: "Unit 3" },
            { word: "far", meaning: "远", unit: "Unit 3" },
            { word: "robot", meaning: "机器人", unit: "Unit 3" },
            { word: "know", meaning: "知道", unit: "Unit 3" },
            { word: "third", meaning: "第三", unit: "Unit 3" },
            { word: "shelf", meaning: "架子", unit: "Unit 3" },
            { word: "letter", meaning: "信", unit: "Unit 3" },
            { word: "second", meaning: "第二", unit: "Unit 3" },
            { word: "beside", meaning: "旁边", unit: "Unit 3" },
            { word: "playground", meaning: "操场", unit: "Unit 3" },
            { word: "centre", meaning: "中心", unit: "Unit 3" },
            { word: "smart", meaning: "聪明的", unit: "Unit 3" },
            { word: "community", meaning: "社区", unit: "Unit 3" },
            { word: "themselves", meaning: "他们自己", unit: "Unit 3" },
            { word: "dark", meaning: "黑暗的", unit: "Unit 3" },
            { word: "toilet", meaning: "厕所", unit: "Unit 3" },
            { word: "between", meaning: "之间", unit: "Unit 3" },
            { word: "supermarket", meaning: "超市", unit: "Unit 3" },
            { word: "quickly", meaning: "快速地", unit: "Unit 3" }
        ];
        
        let currentIndex = 0, correctCount = 0, wrongCount = 0, isWaiting = false;
        
        function shuffle() {
            for (let i = words.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [words[i], words[j]] = [words[j], words[i]];
            }
        }
        
        function disableButtons() {
            document.getElementById('knowBtn').disabled = true;
            document.getElementById('dontKnowBtn').disabled = true;
        }
        
        function enableButtons() {
            document.getElementById('knowBtn').disabled = false;
            document.getElementById('dontKnowBtn').disabled = false;
        }
        
        function answer(isCorrect) {
            if (isWaiting) return;
            disableButtons();
            
            if (isCorrect) {
                correctCount++;
                document.getElementById('correct').textContent = correctCount;
                nextWord();
            } else {
                wrongCount++;
                document.getElementById('wrong').textContent = wrongCount;
                document.getElementById('meaning').classList.add('show');
                
                let count = 5;
                document.getElementById('countdown').classList.add('show');
                document.getElementById('countdownNum').textContent = count;
                
                isWaiting = true;
                
                let timer = setInterval(() => {
                    count--;
                    document.getElementById('countdownNum').textContent = count;
                    if (count <= 0) {
                        clearInterval(timer);
                        document.getElementById('countdown').classList.remove('show');
                        isWaiting = false;
                        nextWord();
                    }
                }, 1000);
            }
        }
        
        function nextWord() {
            currentIndex++;
            if (currentIndex >= words.length) {
                showCelebration();
                return;
            }
            
            document.getElementById('unitTag').textContent = words[currentIndex].unit;
            document.getElementById('word').textContent = words[currentIndex].word;
            document.getElementById('meaning').textContent = words[currentIndex].meaning;
            document.getElementById('meaning').classList.remove('show');
            enableButtons();
            
            // 自动朗读单词
            speakWord();
            
            document.getElementById('progressText').textContent = (currentIndex + 1) + ' / ' + words.length;
            document.getElementById('progressFill').style.width = ((currentIndex + 1) / words.length * 100) + '%';
        }
        
        // 朗读单词函数
        function speakWord() {
            const word = words[currentIndex].word;
            if ('speechSynthesis' in window) {
                // 先停止之前的朗读
                speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                
                // 添加错误处理
                utterance.onerror = function(event) {
                    console.log('语音播放错误: ' + event.error);
                };
                
                speechSynthesis.speak(utterance);
            }
        }
        
        // 开始游戏函数
        function startGame() {
            // 显示第一个单词
            document.getElementById('unitTag').textContent = words[0].unit;
            document.getElementById('word').textContent = words[0].word;
            document.getElementById('meaning').textContent = words[0].meaning;
            
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('gameContent').classList.remove('hidden');
            // 点击开始后朗读第一个单词
            speakWord();
        }
        
        function showCelebration() {
            document.getElementById('quiz').style.display = 'none';
            document.querySelector('.progress').style.display = 'none';
            document.querySelector('.total-stats').style.display = 'none';
            document.getElementById('celebration').classList.add('show');
        }
        
        function restart() {
            currentIndex = 0; correctCount = 0; wrongCount = 0; isWaiting = false;
            shuffle();
            
            document.getElementById('correct').textContent = '0';
            document.getElementById('wrong').textContent = '0';
            document.getElementById('unitTag').textContent = words[0].unit;
            document.getElementById('word').textContent = words[0].word;
            document.getElementById('meaning').textContent = words[0].meaning;
            document.getElementById('meaning').classList.remove('show');
            document.getElementById('countdown').classList.remove('show');
            enableButtons();
            
            document.getElementById('progressText').textContent = '1 / ' + words.length;
            document.getElementById('progressFill').style.width = (1 / words.length * 100) + '%';
            
            document.getElementById('quiz').style.display = 'block';
            document.querySelector('.progress').style.display = 'block';
            document.querySelector('.total-stats').style.display = 'block';
            document.getElementById('celebration').classList.remove('show');
        }
        
        shuffle();
        
        // 页面加载时先显示开始按钮
    </script>
</body>
</html>
